<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: rgba(15, 23, 42, 0.82);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --field-bg: rgba(255, 255, 255, 0.06);
            --field-border: rgba(148, 163, 184, 0.28);
            --shadow: 0 24px 70px rgba(2, 6, 23, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.24), transparent 34%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.18), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        .card {
            width: min(100%, 460px);
            padding: 32px;
            border: 1px solid var(--card-border);
            border-radius: 24px;
            background: var(--card);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            line-height: 1.1;
        }

        .subtitle {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            margin-top: 28px;
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #dbeafe;
        }

        input {
            width: 100%;
            border: 1px solid var(--field-border);
            border-radius: 14px;
            padding: 14px 16px;
            font: inherit;
            color: var(--text);
            background: var(--field-bg);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border-color: rgba(56, 189, 248, 0.9);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
            transform: translateY(-1px);
        }

        .hint {
            margin: 0;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 6px;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            color: #082f49;
            background: linear-gradient(135deg, #7dd3fc, var(--accent));
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(14, 165, 233, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(14, 165, 233, 0.34);
            filter: brightness(1.02);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-note {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        .footer-note a {
            color: #bae6fd;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px;
                border-radius: 20px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card" aria-labelledby="form-title">
            <p class="eyebrow">Spring Boot Demo</p>
            <h1 id="form-title">Create your user</h1>
            <p class="subtitle">
                Enter a username and password to submit the form to the controller.
            </p>

            <form th:action="@{/submitUser}" method="post">
                <div class="field">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter a username"
                        autocomplete="username"
                        required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter a password"
                        autocomplete="current-password"
                        required>
                </div>

                <p class="hint">This form posts to <code>/submitUser</code>.</p>

                <div class="actions">
                    <button type="submit">Submit</button>
                </div>
            </form>

            <p class="footer-note">
                Tip: keep the page linked with your other templates like <a th:href="@{/hello}" href="/hello">Hello</a>.
            </p>
        </section>
    </main>
</body>
</html>
