<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Result</title>
    <style>
        :root {
            --bg-1: #082f49;
            --bg-2: #0f172a;
            --card: rgba(15, 23, 42, 0.82);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-2: #38bdf8;
            --field-bg: rgba(255, 255, 255, 0.06);
            --shadow: 0 24px 70px rgba(2, 6, 23, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 32%),
                radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.16), transparent 28%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        .card {
            width: min(100%, 520px);
            padding: 34px;
            border: 1px solid var(--card-border);
            border-radius: 24px;
            background: var(--card);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            line-height: 1.1;
        }

        .subtitle {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .details {
            margin-top: 28px;
            display: grid;
            gap: 14px;
        }

        .row {
            display: grid;
            gap: 8px;
            padding: 16px 18px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 16px;
            background: var(--field-bg);
        }

        .label {
            color: #dbeafe;
            font-size: 0.92rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .value {
            font-size: 1.1rem;
            word-break: break-word;
        }

        .value.code {
            font-family: Consolas, "Courier New", monospace;
            color: #bae6fd;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        a.button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            color: #082f49;
            background: linear-gradient(135deg, #7dd3fc, var(--accent-2));
            box-shadow: 0 14px 28px rgba(14, 165, 233, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        a.button.secondary {
            color: var(--text);
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.28);
            box-shadow: none;
        }

        a.button:hover {
            transform: translateY(-1px);
        }

        .note {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px;
                border-radius: 20px;
            }

            .actions {
                flex-direction: column;
            }

            a.button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card" aria-labelledby="result-title">
            <p class="eyebrow">Submission Complete</p>
            <h1 id="result-title">Welcome, <span th:text="${name}">username</span>!</h1>
            <p class="subtitle">
                Your form was submitted successfully.
            </p>
            </div>


            <div class="actions">
                <a class="button" th:href="@{/form}" href="/form">Back to form</a>
                <a class="button secondary" th:href="@{/hello}" href="/hello">Home</a>
            </div>

            <p class="note">
                The controller now stores these values as `name` and `password`.
            </p>
        </section>
    </main>
</body>
</html>
